<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAIR CODE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@300;500&display=swap');

:root{
  --primary:#00ffa6;
  --secondary:#00c97f;
  --accent:#00ffcc;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}

/* 🌌 BACKGROUND */
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:Rajdhani,sans-serif;
  color:#fff;
  overflow:hidden;
  background:#010101;
}

/* stars */
.stars{
  position:absolute;
  width:100%;
  height:100%;
  z-index:-3;
}
.star{
  position:absolute;
  width:2px;height:2px;
  background:#fff;
  opacity:.8;
  border-radius:50%;
  animation:starMove linear infinite;
}
@keyframes starMove{
  from{transform:translateY(100vh)}
  to{transform:translateY(-10vh)}
}

/* gradient waves */
.bg-glow{
  position:absolute;
  width:200%;
  height:200%;
  background:radial-gradient(circle, rgba(0,255,166,.15), transparent 60%);
  animation:moveGlow 12s infinite alternate;
  z-index:-2;
}
@keyframes moveGlow{
  from{transform:translate(-25%,-25%)}
  to{transform:translate(0,0)}
}

/* ✨ MAIN CARD */
.box{
  width:90%;
  max-width:340px;
  padding:30px 22px;
  border-radius:24px;

  background:rgba(255,255,255,.03);
  backdrop-filter:blur(30px);

  border:1px solid rgba(0,255,166,.2);

  box-shadow:
    0 0 80px rgba(0,255,166,.15),
    inset 0 0 40px rgba(0,255,166,.08);

  text-align:center;
  position:relative;
  overflow:hidden;
  transition:.5s;
}

/* holographic border */
.box::before{
  content:"";
  position:absolute;
  inset:-1px;
  border-radius:24px;
  background:linear-gradient(120deg,transparent,var(--primary),transparent);
  opacity:.3;
  animation:borderFlow 6s linear infinite;
}

@keyframes borderFlow{
  from{transform:translateX(-100%)}
  to{transform:translateX(100%)}
}

/* floating hover */
.box:hover{
  transform:translateY(-12px) scale(1.02);
  box-shadow:
    0 0 120px rgba(0,255,166,.4),
    inset 0 0 60px rgba(0,255,166,.15);
}

/* LOGO */
.logo-text{
  font-family:Orbitron;
  font-size:28px;
  font-weight:700;
  letter-spacing:4px;
  background:linear-gradient(90deg,var(--primary),var(--accent));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 25px rgba(0,255,166,.9);
  margin-bottom:14px;
}

/* TEXT */
h3{
  color:var(--primary);
  font-size:16px;
  margin-bottom:5px;
}
h6{
  opacity:.7;
  margin-bottom:20px;
}

/* INPUT */
.input-container{
  display:flex;
  margin-bottom:18px;
}
.input-container input{
  flex:1;
  padding:14px;
  border-radius:12px 0 0 12px;
  border:none;
  background:rgba(0,0,0,.7);
  color:#fff;
}
.input-container input:focus{
  outline:none;
  box-shadow:0 0 20px rgba(0,255,166,.8);
}

/* BUTTON */
.input-container button{
  padding:14px 18px;
  border:none;
  border-radius:0 12px 12px 0;
  font-family:Orbitron;
  cursor:pointer;
  background:linear-gradient(135deg,var(--secondary),var(--accent));
  color:#000;
  font-weight:bold;
  box-shadow:0 0 25px rgba(0,255,166,.8);
  transition:.3s;
}
.input-container button:hover{
  transform:scale(1.07);
  box-shadow:0 0 40px rgba(0,255,166,1);
}

/* WAIT */
#waiting-message{
  color:var(--primary);
  font-family:Orbitron;
}

/* CODE */
.code-display{
  margin-top:12px;
  padding:14px;
  border-radius:12px;
  background:rgba(0,0,0,.7);
  border:1px solid rgba(0,255,166,.4);
  display:flex;
  justify-content:center;
  gap:10px;
  cursor:pointer;
  box-shadow:0 0 30px rgba(0,255,166,.5);
}
.code-display:hover{
  transform:scale(1.05);
}
.code-value{
  color:var(--primary);
  font-family:Orbitron;
}

/* pulse */
.pulse{
  animation:pulse 1.5s infinite;
}
@keyframes pulse{
  0%{box-shadow:0 0 0 rgba(0,255,166,.8)}
  70%{box-shadow:0 0 35px rgba(0,255,166,0)}
  100%{box-shadow:0 0 0 rgba(0,255,166,0)}
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>
<div class="bg-glow"></div>

<div class="box">
  <div class="logo-text">PAIR CODE</div>

  <h3>∞ Link with phone number ∞</h3>
  <h6>Enter Your Number With Country Code</h6>

  <div class="input-container">
    <input placeholder="+254xxxxxxxx" type="tel" id="number">
    <button id="submit">ENTER</button>
  </div>

  <a id="waiting-message" style="display:none">Processing...</a>
  <main id="pair"></main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>

<script>
let a=document.getElementById("pair");
let b=document.getElementById("submit");
let c=document.getElementById("number");
let waitingMessage=document.getElementById("waiting-message");

/* stars */
function createStars(){
  const s=document.getElementById("stars");
  for(let i=0;i<100;i++){
    let star=document.createElement("div");
    star.className="star";
    star.style.left=Math.random()*100+"%";
    star.style.animationDuration=(4+Math.random()*10)+"s";
    s.appendChild(star);
  }
}
createStars();

/* copy */
async function Copy(){
  let t=document.getElementById("copy-value").innerText;
  await navigator.clipboard.writeText(t);
}

/* FUNCTIONALITY (UNCHANGED) */
b.addEventListener("click",async(e)=>{
  e.preventDefault();
  if(!c.value){
    a.innerHTML="Enter number";
  }else{
    waitingMessage.style.display="block";
    a.innerHTML="";
    try{
      let{data}=await axios(`/code?number=${c.value.replace(/[^0-9]/g,"")}`);
      waitingMessage.style.display="none";
      a.innerHTML=`
      <div class="code-display pulse" onclick="Copy()">
        <i class="fas fa-copy"></i>
        <span id="copy-value">${data.code}</span>
      </div>`;
    }catch{
      waitingMessage.style.display="none";
      a.innerHTML="Service Unavailable";
    }
  }
});
</script>
</body>
</html>
